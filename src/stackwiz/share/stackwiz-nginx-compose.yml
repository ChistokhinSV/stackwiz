services:
  nginx:
    image: nginxinc/nginx-unprivileged:alpine
    container_name: stackwiz-nginx
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /opt/stackwiz/nginx/conf.d:/etc/nginx/conf.d:ro
      - /opt/stackwiz/nginx/tls:/etc/nginx/tls:ro
      - /opt/stackwiz/nginx/auth:/etc/nginx/auth:ro
    ports:
      - "80:8080"
      - "443:8443"
    logging:
      driver: gelf
      options:
        gelf-address: "udp://127.0.0.1:12201"
        tag: "{{.Name}}"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 5s

networks:
  default:
    name: stackwiz-shared
    # external: true — the network is (or may be) pre-created by
    # another install in this lab (081's consul.sh creates it
    # idempotently; so does 082's batfish.sh). Without this flag,
    # compose refuses to attach to a network that doesn't carry
    # its own `com.docker.compose.network: default` label — typical
    # error:
    #   "network stackwiz-shared was found but has incorrect label
    #    com.docker.compose.network set to '' (expected: 'default')"
    # Marking external tells compose to take what's there as-is.
    external: true
